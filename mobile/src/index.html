<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<meta name="theme-color" content="#3B82F6"/>
<title>My Productivity App</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link rel="stylesheet" href="css/mobile.css">
</head>
<body class="h-screen w-screen overflow-hidden flex flex-col bg-white text-gray-800" style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">

<div id="page-home" class="hidden flex-1 flex flex-col items-center justify-center bg-white px-4"></div>

<div id="page-pomodoro" class="flex-1 flex flex-col overflow-hidden">
  <div class="flex-1 flex flex-col items-center justify-center min-h-0 overflow-y-auto p-4">
    <div class="text-gray-400 text-sm mb-6 flex items-center gap-1">
      Focus <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
    </div>
    <div class="w-full max-w-[280px] aspect-square timer-circle flex items-center justify-center mb-10 relative" id="timerCircle">
      <svg class="absolute inset-0 w-full h-full -rotate-90 pointer-events-none" viewBox="0 0 400 400">
        <circle cx="200" cy="200" fill="none" r="192" stroke="#F3F4F6" stroke-width="8" id="progressBg"></circle>
        <circle cx="200" cy="200" fill="none" r="192" stroke="#3B82F6" stroke-linecap="round" stroke-width="8" stroke-dasharray="1214.37" stroke-dashoffset="1224.37" id="progressRing"></circle>
      </svg>
      <div class="text-5xl font-light text-gray-800 tracking-tight cursor-pointer" id="timerText" onclick="openTimePopup()">50:00</div>
    </div>
    <div class="flex items-center justify-center gap-4">
      <button class="bg-blue-600 text-white font-medium text-lg px-12 py-3 rounded-full shadow-md cursor-pointer select-none active:scale-95 transition-transform" id="startBtn" onclick="toggleTimer()">Start</button>
      <button class="bg-red-500 text-white font-medium text-lg px-8 py-3 rounded-full shadow-md cursor-pointer select-none hidden active:scale-95 transition-transform" id="endBtn" onclick="openEndPopup()">End</button>
    </div>
  </div>
  <div class="flex-shrink-0 border-t border-gray-100 bg-white px-3 py-2 overflow-hidden">
    <div class="flex items-center gap-2 overflow-x-auto scrollbar-hide" id="sessionTimelineScroll" style="scrollbar-width:none;-ms-overflow-style:none">
      <div class="flex items-center gap-2" id="sessionTimelineTrack"></div>
    </div>
  </div>
</div>

<div id="page-habits" class="hidden flex-1 flex flex-col overflow-hidden bg-white">
  <div class="flex items-center justify-between px-5 py-4 border-b border-gray-100 shrink-0">
    <h2 class="text-lg font-semibold">Habits</h2>
    <button onclick="openNewTagPopup()" class="w-9 h-9 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center">
      <i class="fas fa-plus text-sm"></i>
    </button>
  </div>
  <div class="flex-1 overflow-y-auto px-4 py-4" id="main-scroll">
    <div id="habitGrid"></div>
  </div>
</div>

<div id="page-settings" class="hidden flex-1 flex flex-col overflow-hidden bg-white">
  <div class="flex items-center justify-between px-5 py-4 border-b border-gray-100 shrink-0">
    <h2 class="text-lg font-semibold">Settings</h2>
  </div>
  <div class="flex-1 overflow-y-auto px-4 py-4">
    <div class="space-y-4">
      <div>
        <label class="text-sm text-gray-500 block mb-1">Timer Duration (min)</label>
        <div class="flex gap-2">
          <button class="flex-1 py-3 rounded-xl text-sm font-medium bg-gray-100 text-gray-600" onclick="setPreset(25)">25</button>
          <button class="flex-1 py-3 rounded-xl text-sm font-medium bg-gray-100 text-gray-600" onclick="setPreset(50)">50</button>
          <button class="flex-1 py-3 rounded-xl text-sm font-medium bg-gray-100 text-gray-600" onclick="setPreset(90)">90</button>
        </div>
        <button onclick="openTimePopup()" class="mt-2 w-full py-3 rounded-xl text-sm font-medium bg-blue-600 text-white">Custom Time</button>
      </div>
      <div>
        <label class="text-sm text-gray-500 block mb-1">Theme</label>
        <select id="themeSelect" onchange="setTheme(this.value)" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm bg-white"></select>
      </div>
      <div>
        <label class="text-sm text-gray-500 block mb-1">Data</label>
        <button onclick="exportMobileData()" class="w-full py-3 rounded-xl text-sm font-medium border border-gray-200 text-gray-600 mb-2">Export Data</button>
        <button onclick="importMobileData()" class="w-full py-3 rounded-xl text-sm font-medium border border-gray-200 text-gray-600">Import Data</button>
      </div>
      <div class="text-xs text-gray-400 text-center pt-4" id="appVersionDisplay">v1.0.0 (beta)</div>
    </div>
  </div>
</div>

<nav id="bottomNav" class="flex-shrink-0 flex items-center justify-around bg-white border-t border-gray-200 safe-area-bottom" style="padding-bottom:max(env(safe-area-inset-bottom,0px),8px)">
  <button class="nav-btn flex flex-col items-center gap-0.5 py-2 px-4 text-gray-400" data-page="home">
    <i class="fas fa-home text-xl"></i>
    <span class="text-[10px]">Home</span>
  </button>
  <button class="nav-btn flex flex-col items-center gap-0.5 py-2 px-4 text-blue-600" data-page="pomodoro">
    <i class="fas fa-clock text-xl"></i>
    <span class="text-[10px]">Timer</span>
  </button>
  <button class="nav-btn flex flex-col items-center gap-0.5 py-2 px-4 text-gray-400" data-page="habits">
    <i class="fas fa-check-circle text-xl"></i>
    <span class="text-[10px]">Habits</span>
  </button>
  <button class="nav-btn flex flex-col items-center gap-0.5 py-2 px-4 text-gray-400" data-page="settings">
    <i class="fas fa-cog text-xl"></i>
    <span class="text-[10px]">Settings</span>
  </button>
</nav>

<div id="timePopup" class="fixed inset-0 z-50 hidden" style="background:rgba(0,0,0,0.3);display:none" onclick="closePopup(event,'timePopup')">
  <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-2xl p-6 pb-8" onclick="event.stopPropagation()">
    <h3 class="text-lg font-semibold mb-4">Set Timer</h3>
    <input type="number" id="timeInput" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-lg text-center" value="50" min="1" max="999">
    <div class="flex gap-3 mt-4">
      <button onclick="closePopup(event,'timePopup')" class="flex-1 py-3 rounded-xl border border-gray-200 text-gray-600 text-sm font-medium">Cancel</button>
      <button onclick="applyTimePopup()" class="flex-1 py-3 rounded-xl bg-blue-600 text-white text-sm font-medium">Apply</button>
    </div>
  </div>
</div>

<div id="endPopup" class="fixed inset-0 z-50 hidden" style="background:rgba(0,0,0,0.3);display:none" onclick="closePopup(event,'endPopup')">
  <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-2xl p-6 pb-8" onclick="event.stopPropagation()">
    <h3 class="text-lg font-semibold mb-4">End Session</h3>
    <div class="flex gap-3">
      <button onclick="closePopup(event,'endPopup')" class="flex-1 py-3 rounded-xl border border-gray-200 text-gray-600 text-sm font-medium">Cancel</button>
      <button onclick="confirmEnd()" class="flex-1 py-3 rounded-xl bg-red-500 text-white text-sm font-medium">End</button>
    </div>
  </div>
</div>

<div id="sessionPopup" class="fixed inset-0 z-50 hidden" style="background:rgba(0,0,0,0.3);display:none" onclick="closePopup(event,'sessionPopup')">
  <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-2xl p-6 pb-8" onclick="event.stopPropagation()">
    <div class="flex justify-between items-center mb-4">
      <h3 class="text-lg font-semibold">Session</h3>
      <button onclick="closePopup(event,'sessionPopup')" class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-gray-500">
        <i class="fas fa-times text-sm"></i>
      </button>
    </div>
    <input type="text" id="sessionTaskInput" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm mb-3" placeholder="Task name">
    <div class="flex items-center gap-2 mb-4">
      <button onclick="toggleTagDropdown(event)" class="px-4 py-2 rounded-lg border border-gray-200 text-sm text-gray-500 flex items-center gap-1">
        <i class="fas fa-tag text-xs"></i> Tag
      </button>
      <div id="sessionTagDisplay" class="text-xs text-gray-400">None</div>
    </div>
    <div id="tagDropdown" class="hidden mb-3 bg-gray-50 rounded-xl p-2 relative">
      <div id="tagList"></div>
    </div>
    <div class="flex gap-3">
      <button onclick="closePopup(event,'sessionPopup')" class="flex-1 py-3 rounded-xl border border-gray-200 text-gray-600 text-sm font-medium">Cancel</button>
      <button onclick="saveSessionEdit()" class="flex-1 py-3 rounded-xl bg-blue-600 text-white text-sm font-medium">Save</button>
    </div>
  </div>
</div>

<div id="newTagPopup" class="fixed inset-0 z-50 hidden" style="background:rgba(0,0,0,0.3);display:none" onclick="closePopup(event,'newTagPopup')">
  <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-2xl p-6 pb-8" onclick="event.stopPropagation()">
    <h3 class="text-lg font-semibold mb-4">New Tag</h3>
    <input type="text" id="newTagNameInput" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm mb-3" placeholder="Tag name">
    <div id="colorPalette" class="flex gap-2 mb-4"></div>
    <div class="flex gap-3">
      <button onclick="closePopup(event,'newTagPopup')" class="flex-1 py-3 rounded-xl border border-gray-200 text-gray-600 text-sm font-medium">Cancel</button>
      <button onclick="saveNewTag()" class="flex-1 py-3 rounded-xl bg-blue-600 text-white text-sm font-medium">Save</button>
    </div>
  </div>
</div>

<div id="addSessionPopup" class="fixed inset-0 z-50 hidden" style="background:rgba(0,0,0,0.3);display:none" onclick="closePopup(event,'addSessionPopup')">
  <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-2xl p-6 pb-8" onclick="event.stopPropagation()">
    <h3 class="text-lg font-semibold mb-4">Add Session</h3>
    <input type="text" id="addSessionTaskInput" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm mb-3" placeholder="Task name">
    <input type="number" id="addSessionDurationInput" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm mb-3" placeholder="Duration (min)" value="25">
    <div class="flex items-center gap-2 mb-4">
      <button onclick="toggleAddTagDropdown(event)" class="px-4 py-2 rounded-lg border border-gray-200 text-sm text-gray-500 flex items-center gap-1">
        <i class="fas fa-tag text-xs"></i> Tag
      </button>
      <div id="addSessionTagDisplay" class="text-xs text-gray-400">None</div>
    </div>
    <div id="addTagDropdown" class="hidden mb-3 bg-gray-50 rounded-xl p-2">
      <div id="addTagList"></div>
    </div>
    <div class="flex gap-3">
      <button onclick="closePopup(event,'addSessionPopup')" class="flex-1 py-3 rounded-xl border border-gray-200 text-gray-600 text-sm font-medium">Cancel</button>
      <button onclick="saveAddSession()" class="flex-1 py-3 rounded-xl bg-blue-600 text-white text-sm font-medium">Add</button>
    </div>
  </div>
</div>

<div id="updateModal" style="position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.3);align-items:flex-end;justify-content:center;padding:16px;display:none" onclick="closeUpdateModal(event)">
  <div style="background:white;border-radius:16px;padding:24px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,0.15);position:relative" onclick="event.stopPropagation()">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
      <img src="../src/assets/Jamrah-Icon.svg" alt="Jamrah" style="width:32px;height:32px"/>
      <div>
        <h3 style="font-size:20px;font-weight:600;color:#1F2937">Jamrah جَــمْــرَه</h3>
        <p style="font-size:13px;color:#6B7280">New version: <span id="updateVersion" style="font-weight:600;color:#374151"></span></p>
      </div>
    </div>
    <label style="font-size:13px;color:#6B7280;margin-bottom:8px;display:block">Release Notes</label>
    <div id="updateReleaseNotes" style="font-size:13px;color:#4B5563;background:#F9FAFB;border-radius:12px;padding:12px;max-height:120px;overflow-y:auto;margin-bottom:20px;white-space:pre-line;line-height:1.5"></div>
    <div style="display:flex;justify-content:flex-end;gap:12px">
      <button onclick="closeUpdateModal(event)" style="padding:10px 24px;border:1px solid #E5E7EB;border-radius:12px;font-size:13px;color:#4B5563;background:white;cursor:pointer;font-weight:500">Cancel</button>
      <button onclick="downloadUpdate()" style="padding:10px 24px;background:#3B82F6;color:white;border:none;border-radius:12px;font-size:13px;cursor:pointer;font-weight:500">Download</button>
    </div>
  </div>
</div>

<script src="js/mobile-db.js"></script>
<script src="js/storage.js"></script>
<script src="js/stats.js"></script>
<script src="js/timer.js"></script>
<script src="js/sessions.js"></script>
<script src="js/theme.js"></script>
<script>
/* ── Page switching (mobile bottom nav) ── */
function showPage(name) {
  var pages = ['home', 'pomodoro', 'habits', 'settings'];
  pages.forEach(function(p) {
    var el = document.getElementById('page-' + p);
    if (el) {
      if (p === name) el.classList.remove('hidden'); else el.classList.add('hidden');
    }
  });
  document.querySelectorAll('.nav-btn').forEach(function(b) {
    var page = b.getAttribute('data-page');
    if (page === name) { b.classList.remove('text-gray-400'); b.classList.add('text-blue-600'); }
    else { b.classList.remove('text-blue-600'); b.classList.add('text-gray-400'); }
  });
}

document.querySelectorAll('.nav-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    showPage(this.getAttribute('data-page'));
  });
});

/* ── Timer helpers (not in timer.js) ── */
function applyTimePopup() { if (window.setTimer) window.setTimer(); }

/* ── Popup helper (mobile bottom sheets) ── */
function closePopup(e, id) {
  if (!e || e.target === e.currentTarget) {
    document.getElementById(id).style.display = 'none';
  }
}

function openBottomSheet(id) {
  document.getElementById(id).style.display = 'flex';
}

/* ── Update system ── */
var APP_VERSION = '1.0.0';
var updateData = null;

document.addEventListener('DOMContentLoaded', function() {
  var vd = document.getElementById('appVersionDisplay');
  if (vd) vd.textContent = 'v' + APP_VERSION + ' (beta)';
  checkMobileUpdate();
});

function checkMobileUpdate() {
  var url = 'https://raw.githubusercontent.com/AhmMed29/My-Productivity-App/main/update.json';
  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.version > APP_VERSION) {
        updateData = data;
        document.getElementById('updateVersion').textContent = data.version;
        document.getElementById('updateReleaseNotes').textContent = data.releaseNotes || '';
        document.getElementById('updateModal').style.display = 'flex';
      }
    })
    .catch(function() {});
}

window.downloadUpdate = function() {
  if (updateData && updateData.downloadUrl) {
    window.open(updateData.downloadUrl, '_blank');
  }
  document.getElementById('updateModal').style.display = 'none';
};

window.closeUpdateModal = function(e) {
  if (!e || e.target === e.currentTarget) {
    document.getElementById('updateModal').style.display = 'none';
  }
};

/* ── Mobile settings helpers ── */
function setPreset(min) {
  stopTimer();
  totalSeconds = min * 60;
  remainingSeconds = totalSeconds;
  if (startBtn) startBtn.textContent = 'Start';
  if (endBtn) endBtn.classList.add('hidden');
  if (timerText) timerText.textContent = formatTime(remainingSeconds);
  updateRing();
}

function exportMobileData() {
  var data = {
    settings: window.db.getAllSettings(),
    tags: window.db.getTags(),
    sessionsGrouped: window.db.getSessionsGrouped()
  };
  var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'my-productivity-backup.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

function importMobileData() {
  var input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var data = JSON.parse(ev.target.result);
        if (data.settings) localStorage.setItem('settings', JSON.stringify(data.settings));
        if (data.tags) localStorage.setItem('tags', JSON.stringify(data.tags));
        if (data.sessionsGrouped) localStorage.setItem('sessionsGrouped', JSON.stringify(data.sessionsGrouped));
        alert('Data imported successfully. Reload the app.');
        location.reload();
      } catch(err) { alert('Invalid file'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

/* ── Init ── */
showPage('pomodoro');
</script>
</body>
</html>
